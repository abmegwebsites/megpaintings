<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earthly Expressions</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

background:#22140D;

overflow-x:hidden;

font-family:"Inter",sans-serif;

}





/* ========================= */
/* SCROLLING BANNER */
/* ========================= */

.gallery{

width:100%;

overflow:hidden;

margin-top:18px;

position:relative;

}

.track{

display:flex;

width:max-content;

/* 40% slower */

animation:scrollGallery 100s linear infinite;

}

.group{

display:flex;

}

/* Banner 20% Larger */

.group img{

width:845px;

height:452px;

object-fit:cover;

flex-shrink:0;

pointer-events:none;

user-select:none;

-webkit-user-drag:none;

}

@keyframes scrollGallery{

from{

transform:translateX(0);

}

to{

transform:translateX(-50%);

}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

nav{

padding:0 25px;

}

.logo{

font-size:40px;

}

nav ul{

gap:18px;

}

.hero{

padding-top:18px;

}

.hero h1{

font-size:58px;

}

.hero p{

font-size:18px;

}

.group img{

width:520px;

height:280px;

}

}

</style>

</head>
<body>





<div class="gallery">

    <div class="track">

        <!-- First Copy -->

        <div class="group">

            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">

        </div>

        <!-- Second Copy (Required for seamless infinite scrolling) -->

        <div class="group">

            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">

        </div>

    </div>

</div>

</body>

</html>
