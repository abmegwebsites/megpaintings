<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earthly Expressions</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

background:#22140D;

overflow-x:hidden;

font-family:"Inter",sans-serif;

}

/* ========================= */
/* NAVBAR */
/* ========================= */

nav{

width:100%;

height:55px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 70px;

border-bottom:1px solid rgba(255,255,255,.08);

position:relative;

z-index:10;

}

.logo{

font-family:"Cormorant Garamond",serif;

font-size:56px;

font-weight:700;

color:#F4E8CF;

}

/* MENU */

nav ul{

display:flex;

gap:48px;

list-style:none;

}

nav ul li{

position:relative;

}

nav ul li a{

display:flex;

align-items:center;

gap:10px;

text-decoration:none;

color:#E6DAC4;

font-size:14px;

letter-spacing:2px;

transition:.35s;

}

/* ICON */

.nav-icon{

font-size:20px;

opacity:0;

transform:translateX(-12px);

transition:.35s ease;

}

nav ul li:hover .nav-icon{

opacity:1;

transform:translateX(0);

}

.nav-icon:hover{

transform:scale(1.18);

}

nav ul li:hover a{

color:white;

}

/* ========================= */
/* HERO */
/* ========================= */

.hero{

text-align:center;

padding-top:22px;

padding-bottom:20px;

}

.hero h1{

font-family:"Cormorant Garamond",serif;

font-size:70px;

font-weight:500;

line-height:1;

color:#F2E7D0;

}

.hero h1 span{

font-style:italic;

font-weight:400;

}

.hero p{

margin-top:16px;

font-size:15px;

font-family:"Cormorant Garamond",serif;

color:#D5B16A;

}

/* ========================= */
/* SCROLLING BANNER */
/* ========================= */

.gallery{

width:100%;

overflow:hidden;

margin-top:18px;

position:relative;

}

.track{

display:flex;

width:max-content;

/* 40% slower */

animation:scrollGallery 100s linear infinite;

}

.group{

display:flex;

}

/* Banner 20% Larger */

.group img{

width:845px;

height:452px;

object-fit:cover;

flex-shrink:0;

pointer-events:none;

user-select:none;

-webkit-user-drag:none;

}

@keyframes scrollGallery{

from{

transform:translateX(0);

}

to{

transform:translateX(-50%);

}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){

nav{

padding:0 25px;

}

.logo{

font-size:40px;

}

nav ul{

gap:18px;

}

.hero{

padding-top:18px;

}

.hero h1{

font-size:58px;

}

.hero p{

font-size:18px;

}

.group img{

width:520px;

height:280px;

}

}

</style>

</head>
<body>

<nav>

    <div class="logo">BT.</div>

    <ul>

        <li>
            <a href="#">
                <i class="ph ph-house nav-icon"></i>
                <span>HOME</span>
            </a>
        </li>

        <li>
            <a href="#">
                <i class="ph ph-palette nav-icon"></i>
                <span>WORK</span>
            </a>
        </li>

        <li>
            <a href="#">
                <i class="ph ph-user nav-icon"></i>
                <span>ABOUT</span>
            </a>
        </li>

        <li>
            <a href="#">
                <i class="ph ph-envelope-simple nav-icon"></i>
                <span>CONTACT</span>
            </a>
        </li>

    </ul>

</nav>

<section class="hero">

    <h1>

        Meg <span>Canvas Co.</span>

    </h1>

    <p>

       Art that breathes emotion- Explore my meuseum. 

    </p>

</section>

<div class="gallery">

    <div class="track">

        <!-- First Copy -->

        <div class="group">

            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">

        </div>

        <!-- Second Copy (Required for seamless infinite scrolling) -->

        <div class="group">

            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">
            <img src="firefly.png" alt="">

        </div>

    </div>

</div>

</body>

</html>
